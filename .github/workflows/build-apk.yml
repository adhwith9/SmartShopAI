name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build SmartShop AI Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Vite React Production Web Assets
        run: |
          cd frontend
          npm run build

      - name: Add and Sync Capacitor Android Project
        run: |
          cd frontend
          npx cap add android || true
          npx cap sync android

      - name: Build Android Debug APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename and Move APK
        run: |
          mkdir -p apk_output
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk apk_output/SmartShopAI-v1.0.2.apk
          echo "APK successfully generated at apk_output/SmartShopAI-v1.0.2.apk"

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartShopAI-Android-APK
          path: apk_output/SmartShopAI-v1.0.2.apk

      - name: Create or Update GitHub Release with Downloadable APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.2-apk
          name: "SmartShop AI Android APK v1.0.2"
          body: |
            ### 📱 SmartShop AI Native Android App (.apk) - Fixed WebView Asset Loading
            
            Download and install the official SmartShop AI Android application directly onto your Android device!
            
            **File Name**: `SmartShopAI-v1.0.2.apk`  
            **Build Number**: `${{ github.run_number }}`
          files: |
            apk_output/SmartShopAI-v1.0.2.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
