name: Android Appium E2E Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Start Backend Service
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python seed.py
          python app.py &
        env:
          FLASK_ENV: development

      - name: Install & Run Frontend Client
        run: |
          cd frontend
          npm install
          npm run dev &

      - name: Execute Appium E2E Automation tests
        run: |
          cd appium_mobile_node
          npm install
          npx wait-on http://localhost:5001/api/products http://localhost:5173
          node mobile_e2e.js

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Automation_Test_Reports
          path: |
            Test Results/Excel/Automation_Test_Report.xlsx
            Test Results/HTML/execution-report.html
            Test Results/Screenshots/
            Test Results/Logs/
            Test Results/Summary/summary.md

      - name: Publish Reports to GitHub Pages
        if: always()
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone gh-pages branch to temp folder
          git clone --depth=1 --branch gh-pages https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-temp || {
            # Fallback if gh-pages branch does not exist yet
            mkdir gh-pages-temp
            cd gh-pages-temp
            git init
            git remote add origin https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            cd ..
          }
          
          # Create reports layout directories
          mkdir -p gh-pages-temp/reports/latest/screenshots
          mkdir -p gh-pages-temp/reports/latest/logs
          mkdir -p gh-pages-temp/reports/history/build-${{ github.run_number }}/screenshots
          mkdir -p gh-pages-temp/reports/history/build-${{ github.run_number }}/logs
          
          # Copy reports and summaries
          cp -r Test\ Results/HTML/* gh-pages-temp/reports/latest/
          cp -r Test\ Results/HTML/* gh-pages-temp/reports/history/build-${{ github.run_number }}/
          
          cp -r Test\ Results/Summary/* gh-pages-temp/reports/latest/
          cp -r Test\ Results/Summary/* gh-pages-temp/reports/history/build-${{ github.run_number }}/
          
          if [ -d "Test Results/Screenshots" ] && [ "$(ls -A Test\ Results/Screenshots)" ]; then
            cp -r Test\ Results/Screenshots/* gh-pages-temp/reports/latest/screenshots/ || true
            cp -r Test\ Results/Screenshots/* gh-pages-temp/reports/history/build-${{ github.run_number }}/screenshots/ || true
          fi
          
          if [ -d "Test Results/Logs" ] && [ "$(ls -A Test\ Results/Logs)" ]; then
            cp -r Test\ Results/Logs/* gh-pages-temp/reports/latest/logs/ || true
            cp -r Test\ Results/Logs/* gh-pages-temp/reports/history/build-${{ github.run_number }}/logs/ || true
          fi
          
          # Commit and push updates to gh-pages branch
          cd gh-pages-temp
          git add -A
          git commit -m "Deploy Appium E2E Reports - Build ${{ github.run_number }}" || exit 0
          git push origin gh-pages

      - name: Generate Job Run Summary Dashboard
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "# Error: Summary report not generated" >> $GITHUB_STEP_SUMMARY
          fi
